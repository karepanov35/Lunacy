name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lunacy-core:
    name: Lunacy core checks
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: pmmp/setup-php-action@3.2.0
        with:
          php-version: "8.3"
          install-path: "./bin"
          pm-version-major: 5

      - name: Restore Composer cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/composer/files
            ~/.cache/composer/vcs
          key: composer-v2-cache-8.3-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-v2-cache-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Verify PHP syntax
        run: |
          find src generated -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Verify translations
        run: php .github/workflows/verify-translations.php resources/translations
