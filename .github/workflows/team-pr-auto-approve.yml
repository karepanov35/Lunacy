#Due to GitHub awkwardness, it's not easy to reduce the review requirement for collaborators.
#Our policy is that 2 collaborators should be aware of every change.
#For outside PRs, this means 2 collaborator reviews.
#For PRs made by collaborators, this means 1 reviewer + the author.
#We trust that collaborators don't need as much oversight.
name: Auto approve collaborator PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

jobs:
  dispatch:
    name: Request approval
    runs-on: ubuntu-latest
    if: '! github.event.pull_request.draft'
    env:
      RESTRICTED_ACTIONS_DISPATCH_ID: ${{ vars.RESTRICTED_ACTIONS_DISPATCH_ID }}
      RESTRICTED_ACTIONS_DISPATCH_KEY: ${{ secrets.RESTRICTED_ACTIONS_DISPATCH_KEY }}

    steps:
      - name: Check restricted-actions config
        id: restricted-actions-config
        shell: bash
        run: |
          if [ -n "${RESTRICTED_ACTIONS_DISPATCH_ID}" ] && [ -n "${RESTRICTED_ACTIONS_DISPATCH_KEY}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate access token
        if: steps.restricted-actions-config.outputs.configured == 'true'
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RESTRICTED_ACTIONS_DISPATCH_ID }}
          private-key: ${{ secrets.RESTRICTED_ACTIONS_DISPATCH_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: RestrictedActions

      - name: Dispatch restricted action
        if: steps.restricted-actions-config.outputs.configured == 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          repository: ${{ github.repository_owner }}/RestrictedActions
          event-type: auto_approve_collaborator_pr
          client-payload: '{"repo": "${{ github.repository }}", "pull_request_id": "${{ github.event.pull_request.number }}", "reviewer_id": "0" }'

      - name: Skip auto approval dispatch
        if: steps.restricted-actions-config.outputs.configured != 'true'
        run: echo "RestrictedActions dispatch is not configured for this repository, skipping."
